<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Tracker</title>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f7;
    margin: 0;
    padding: 20px;
    color: #333;
  }

  .container {
    max-width: 720px;
    margin: auto;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
  }

  .card {
    background: white;
    padding: 16px;
    border-radius: 14px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    margin-bottom: 20px;
  }

  input, select {
    padding: 10px;
    margin: 6px 0;
    width: 100%;
    border-radius: 10px;
    border: 1px solid #ddd;
    background: #fafafa;
  }

  button {
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #6c8ef5;
    color: white;
    cursor: pointer;
    width: 100%;
    font-size: 15px;
  }

  button:hover {
    background: #5a78d6;
  }

  .book {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #eee;
  }

  .cover {
    width: 55px;
    height: 80px;
    object-fit: cover;
    border-radius: 6px;
    background: #ddd;
  }

  .info {
    flex: 1;
  }

  .title {
    font-weight: 600;
  }

  .author {
    font-size: 13px;
    color: #777;
  }

  .date {
    font-size: 12px;
    color: #999;
  }

  .stars {
    color: #f5b301;
    font-size: 16px;
    cursor: pointer;
  }

  .badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    margin-bottom: 6px;
    display: inline-block;
  }

  .read {
    background: #e6f4ea;
    color: #2e7d32;
  }

  .unread {
    background: #e3f2fd;
    color: #1565c0;
  }

  .actions {
    text-align: right;
  }

  .actions button {
    width: auto;
    margin-top: 4px;
    padding: 5px 8px;
    font-size: 12px;
  }

  .delete {
    background: #e57373;
  }

</style>
</head>

<body>

<div class="container">
  <h1>📚 Book Tracker</h1>

  <div class="card">
    <form id="bookForm">
      <input type="text" id="title" placeholder="Book Title" required>
      <input type="text" id="author" placeholder="Author" required>
      <input type="text" id="cover" placeholder="Cover Image URL (optional)">
      
      <label>Date Finished:</label>
      <input type="date" id="date">

      <label>Rating:</label>
      <select id="rating">
        <option value="0">No Rating</option>
        <option value="1">⭐ 1</option>
        <option value="2">⭐⭐ 2</option>
        <option value="3">⭐⭐⭐ 3</option>
        <option value="4">⭐⭐⭐⭐ 4</option>
        <option value="5">⭐⭐⭐⭐⭐ 5</option>
      </select>

      <select id="status">
        <option value="Unread">Unread</option>
        <option value="Read">Read</option>
      </select>

      <button type="submit">Add Book</button>
    </form>
  </div>

  <div class="card" id="bookList"></div>
</div>

<script>
let books = JSON.parse(localStorage.getItem("books")) || [];

function save() {
  localStorage.setItem("books", JSON.stringify(books));
}

function getStars(rating, index) {
  let stars = "";
  for (let i = 1; i <= 5; i++) {
    stars += `<span onclick="setRating(${index}, ${i})">${i <= rating ? "★" : "☆"}</span>`;
  }
  return stars;
}

function render() {
  const list = document.getElementById("bookList");
  list.innerHTML = "";

  books.forEach((book, index) => {
    const div = document.createElement("div");
    div.className = "book";

    div.innerHTML = `
      <img class="cover" src="${book.cover || 'https://via.placeholder.com/55x80'}">

      <div class="info">
        <div class="title">${book.title}</div>
        <div class="author">${book.author}</div>
        ${book.date ? `<div class="date">Finished: ${book.date}</div>` : ""}
        <div class="stars">${getStars(book.rating || 0, index)}</div>
      </div>

      <div class="actions">
        <span class="badge ${book.status === 'Read' ? 'read' : 'unread'}">
          ${book.status}
        </span><br>

        <button onclick="toggle(${index})">Toggle</button>
        <button class="delete" onclick="removeBook(${index})">Delete</button>
      </div>
    `;

    list.appendChild(div);
  });
}

function setRating(index, rating) {
  books[index].rating = rating;
  save();
  render();
}

function toggle(index) {
  books[index].status = books[index].status === "Read" ? "Unread" : "Read";
  save();
  render();
}

function removeBook(index) {
  books.splice(index, 1);
  save();
  render();
}

document.getElementById("bookForm").addEventListener("submit", e => {
  e.preventDefault();

  const title = document.getElementById("title").value;
  const author = document.getElementById("author").value;
  const cover = document.getElementById("cover").value;
  const date = document.getElementById("date").value;
  const rating = parseInt(document.getElementById("rating").value);
  const status = document.getElementById("status").value;

  books.push({ title, author, cover, date, rating, status });

  save();
  render();

  e.target.reset();
});

render();
</script>

</body>
</html>
